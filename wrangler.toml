name = "hobbot-worker"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "GRIMOIRE_DB"
database_name = "grimoire-db"
database_id = "3cb1cdee-17af-477c-ab0a-5a18447948ef"

[[d1_databases]]
binding = "HOBBOT_DB"
database_name = "hobbot-db"
database_id = "d91a32f8-670b-46a3-9008-f16224b2f8d7"
migrations_dir = "migrations/hobbot"

[[kv_namespaces]]
binding = "PROVIDER_HEALTH"
id = "30a7b9ccfd82493b9c96fbe994b40bbe"
preview_id = "85429dee6bca4fb58ad8e032510cc7b0"

[[services]]
binding = "GRIMOIRE"
service = "grimoire"

[[services]]
binding = "HOBBOT_CHAT"
service = "hobbot-chat"

[[services]]
binding = "HOBBOT_CUSTODIAN"
service = "hobbot-custodian"
entrypoint = "CustodianEntrypoint"

[[services]]
binding = "HOBBOT_PIPELINE"
service = "hobbot-pipeline"
entrypoint = "PipelineEntrypoint"

[vars]
ENVIRONMENT = "development"

# Secrets Store
[[secrets_store_secrets]]
binding = "SERVICE_TOKENS"
store_id = "e1efb254fa9e40359b0b3bdeab02b082"
secret_name = "service-tokens"

# RESEND_API_KEY: set via `wrangler secret put` (persists across deploys)

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
